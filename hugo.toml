baseURL = "https://sakaspar.github.io/blog/"
locale = "en-us"
title = "DotKsp Writings"
theme = "PaperMod"
buildFuture = true
enableRobotsTXT = true

[pagination]
  pagerSize = 12

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  googleAnalytics = "G-HB08RW5TT8"
  env = "production"
  title = "DotKsp Writings"
  description = "Thoughts on crypto, tech, fitness, and building things"
  author = "DotKsp"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPageNums = true

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[params.homeInfoParams]
  Title = "DotKsp Writings"
  Content = "The map they don't hand out. Essays on money, health, tech, and the habits that actually stick."

[[params.socialIcons]]
  name = "x"
  url = "https://x.com/Kasper_0927"

[params.profileMode]
  enabled = false
  title = "DotKsp Writings"
  subtitle = "The map they don't hand out."
  imageUrl = "images/avatar.jpg"
  imageWidth = 120
  imageHeight = 120
  imageTitle = "DotKsp"

[params.assets]
  disableHLJS = true

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 15

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 20

[taxonomies]
  category = "categories"
  tag = "tags"
