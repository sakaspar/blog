baseURL = "https://sakaspar.github.io/blog/"
locale = "en-us"
title = "DotKsp Writings"
theme = "PaperMod"
paginate = 5
enableRobotsTXT = true
[params]
  env = "production"
  title = "DotKsp Writings"
  description = "Thoughts on crypto, tech, and building things"
  author = "DotKsp"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

[params.homeInfoParams]
  Title = "DotKsp Writings"
  Content = "NaN"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/sakaspar"

[params.profileMode]
  enabled = true
  title = "DotKsp Writings"
  subtitle = "Crypto · Tech · Building from Tunisia 🇹🇳"
  imageUrl = "images/avatar.jpg"
  imageWidth = 120
  imageHeight = 120
  imageTitle = "DotKsp"


[params.assets]
  disableHLJS = true

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

